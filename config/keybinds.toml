# woven-cfg managed keybinds — source of truth
# Edit via woven-cfg. ~/.config/sway/woven-keybinds is auto-generated.

[[bind]]
category = "core"
key      = "$mod+Return"
action   = "exec kitty"
label    = "Terminal"

[[bind]]
category = "core"
key      = "$mod+d"
action   = "exec ~/.local/bin/woven-launch"
label    = "Launcher"

