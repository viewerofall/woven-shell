[[bind]]
category = "media"
key      = "XF86AudioMute"
action   = "exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"
label    = "Mute"

[[bind]]
category = "media"
key      = "XF86AudioLowerVolume"
action   = "exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
label    = "Volume down"

[[bind]]
category = "media"
key      = "XF86AudioRaiseVolume"
action   = "exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+"
label    = "Volume up"

[[bind]]
category = "media"
key      = "XF86AudioPlay"
action   = "exec playerctl play-pause"
label    = "Play/pause"

[[bind]]
category = "media"
key      = "XF86AudioNext"
action   = "exec playerctl next"
label    = "Next track"

[[bind]]
category = "media"
key      = "XF86AudioPrev"
action   = "exec playerctl previous"
label    = "Previous track"

[[bind]]
category = "media"
key      = "XF86MonBrightnessUp"
action   = "exec brightnessctl set 10%+"
label    = "Brightness up"

[[bind]]
category = "media"
key      = "XF86MonBrightnessDown"
action   = "exec brightnessctl set 10%-"
label    = "Brightness down"

[[bind]]
category = "screenshots"
key      = "Print"
action   = "exec grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png"
label    = "Full screenshot"

[[bind]]
category = "screenshots"
key      = "$mod+Print"
action   = "exec grim -g \"$(slurp)\" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png"
label    = "Area screenshot"

[[bind]]
category = "screenshots"
key      = "$mod+Shift+period"
action   = "exec grim -g \"$(swaymsg -t get_tree | jq -r '.. | select(.focused?) | .rect | \"\\(.x),\\(.y) \\(.width)x\\(.height)\"')\" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png"
label    = "Window screenshot"

